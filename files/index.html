<style>
  @keyframes slideDown {
    0% { transform: translateY(-50px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  @keyframes fadeInUp {
    0% { transform: translateY(20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  @keyframes pulseGlow {
    0% { box-shadow: 0 0 10px rgba(0, 255, 200, 0.2); }
    50% { box-shadow: 0 0 25px rgba(0, 255, 200, 0.6); }
    100% { box-shadow: 0 0 10px rgba(0, 255, 200, 0.2); }
  }
  .welcome-card {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(180deg, #0a0f1c 0%, #111827 100%);
    border: 1px solid #1f2937;
    border-radius: 16px;
    padding: 40px 20px;
    text-align: center;
    color: white;
    max-width: 600px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }
  .welcome-icon {
    font-size: 50px;
    margin-bottom: 20px;
    animation: slideDown 0.8s ease-out;
  }
  .welcome-title {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(90deg, #00f2ff, #00ff9d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0 0 15px 0;
    text-transform: uppercase;
    letter-spacing: 1px;
    animation: fadeInUp 1s ease-out 0.3s backwards;
  }
  .welcome-text {
    color: #9ca3af;
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 30px;
    animation: fadeInUp 1s ease-out 0.6s backwards;
  }
  .welcome-btn {
    display: inline-block;
    padding: 12px 30px;
    background: #00f2ff;
    color: #000;
    text-decoration: none;
    font-weight: bold;
    border-radius: 50px;
    transition: all 0.3s;
    animation: pulseGlow 2s infinite;
  }
  .welcome-btn:hover {
    transform: scale(1.05);
    background: #fff;
    box-shadow: 0 0 30px rgba(0, 242, 255, 0.8);
  }
</style>

<div class="welcome-card">
    <div class="welcome-icon">🛡️</div>
    
    <h1 class="welcome-title">Welcome to TWH OSINT</h1>
    
    <p class="welcome-text">
        Access Granted, Agent. <br>
        Aap duniya ke sabse advanced <strong>Open Source Intelligence Tool</strong> se jud chuke hain.
        Yahan data bolta hai. Apni pehli search abhi shuru karein.
    </p>
    
    <a href="/dashboard" class="welcome-btn">
        START MISSION 🚀
    </a>
</div>
